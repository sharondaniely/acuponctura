site_name: קורס אקופונקטורה
site_description: קורס מקיף בן 5 שנים באקופונקטורה ורפואה סינית מסורתית
site_url: https://sharondaniely.github.io/acuponctura/

docs_dir: .

theme:
  name: material
  direction: rtl
  language: he
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: מצב לילה
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: מצב יום
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.tabs.link
    - toc.integrate
  font:
    text: Noto Sans Hebrew
    code: Roboto Mono

plugins:
  - search:
      lang: he

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables

extra_css:
  - stylesheets/extra.css

